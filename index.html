    <script>
        const TELEGRAM_LINK = "https://t.me/+t5XqpSQN0IplMWQ9"; 

        let timeLeft = 25;
        const timerDisplay = document.getElementById('seconds');

        // Function jo Pixel fire karega aur phir redirect karega
        function trackPixelAndGo(e) {
            if(e) e.preventDefault(); // Ye turant redirect hone se rokega
            
            // Pixel ko lead bhejo
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead'); 
            }
            
            // 500ms (aadha second) ruk kar Telegram bhejo taaki pixel properly send ho jaye
            setTimeout(() => {
                window.location.href = TELEGRAM_LINK;
            }, 500);
        }

        // Timer Logic
        const countdownInterval = setInterval(() => {
            timeLeft--;
            let displayTime = timeLeft < 10 ? "0" + timeLeft : timeLeft;
            timerDisplay.textContent = displayTime;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                trackPixelAndGo(); // Timer khatam hone par wahi pixel + delay wala function chalega
            }
        }, 1000);
    </script>
